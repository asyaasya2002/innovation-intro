<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Floating Image</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f7fa;
    overflow: hidden;
  }

  .floating-img {
    width: 300px;
    animation: float 4s ease-in-out infinite;
    transition: transform 0.3s ease;
  }

  /* Hover interaction */
  .floating-img:hover {
    transform: scale(1.1) rotate(5deg);
  }

  /* Floating animation */
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0px); }
  }
</style>
</head>

<body>

<!-- IMPORTANT: Replace with your GitHub image URL -->
<img 
    src="https://raw.githubusercontent.com/asyaasya2002/innovation-intro/main/ChatGPT%20Image%20Mar%2027,%202026,%2005_04_27%20PM.png" 
  alt="Floating Image" 
  class="floating-img"
/>

</body>
</html>
